name: Code coverage

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: EpiAware/.github/.github/workflows/coverage.yml@42a0501ccacefbfc2f2eeca640714a19c50bfe58
    with:
      julia_version: '1'
    secrets: inherit  # pragma: allowlist secret
